<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Car</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="container">
    <h1>Edit Car</h1>
    <p id="editing-label"></p>

    <form id="car-form">
      <input type="hidden" id="id">
      <div class="form-group">
        <label>Make</label>
        <input type="text" id="make" required>
      </div>
      <div class="form-group">
        <label>Model</label>
        <input type="text" id="model" required>
      </div>
      <div class="form-group">
        <label>Year</label>
        <input type="number" id="year" required>
      </div>
      <div class="form-group">
        <label>Price</label>
        <input type="number" id="price" required>
      </div>
      <div class="form-group">
        <label>Color</label>
        <select id="color">
          <option>Black</option>
          <option>White</option>
          <option>Silver</option>
          <option>Gray</option>
          <option>Red</option>
          <option>Blue</option>
        </select>
      </div>
      <button class="btn btn-edit">
        Update Car
      </button>
    </form>
  </div>

  <script src="scripts/store-http.js"></script>
  <script src="scripts/edit-car.js"></script>
</body>
</html>
